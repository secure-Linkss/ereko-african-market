  <rect x="228" y="260" width="28" height="40" rx="4" fill="#E85D04"/>
  <rect x="232" y="255" width="20" height="10" rx="2" fill="#CC4A00"/>
  <ellipse cx="242" cy="255" rx="10" ry="5" fill="#CC4A00"/>
  <rect x="235" y="265" width="14" height="8" rx="1" fill="#FFD166" opacity="0.8"/>

  <!-- Yam tubers -->
  <ellipse cx="290" cy="292" rx="20" ry="14" fill="#C8965A" transform="rotate(-15 290 292)"/>
  <ellipse cx="315" cy="288" rx="18" ry="12" fill="#BF8A4E" transform="rotate(10 315 288)"/>
  <ellipse cx="305" cy="302" rx="16" ry="11" fill="#D4A86A" transform="rotate(-5 305 302)"/>

  <!-- Plantains -->
  <path d="M345 295 Q360 278 375 285 Q380 290 370 300 Q355 310 345 295Z" fill="#F4D03F" stroke="#D4AC0D" stroke-width="1"/>
  <path d="M360 290 Q375 273 390 280 Q395 285 385 295 Q370 305 360 290Z" fill="#F4D03F" stroke="#D4AC0D" stroke-width="1"/>
  <path d="M375 286 Q390 270 405 277 Q410 282 400 292 Q385 302 375 286Z" fill="#F7DC6F" stroke="#D4AC0D" stroke-width="1"/>

