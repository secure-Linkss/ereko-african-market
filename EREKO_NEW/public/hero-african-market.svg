  <ellipse cx="280" cy="175" rx="32" ry="34" fill="#8B5E3C"/>
  <!-- Ear -->
  <ellipse cx="248" cy="178" rx="6" ry="9" fill="#7A5035"/>
  <ellipse cx="312" cy="178" rx="6" ry="9" fill="#7A5035"/>
  <!-- Earring -->
  <circle cx="248" cy="184" r="4" fill="#FFD166"/>
  <circle cx="312" cy="184" r="4" fill="#FFD166"/>

  <!-- Face features -->
  <!-- Eyes -->
  <ellipse cx="268" cy="170" rx="6" ry="7" fill="#1A0A00"/>
  <ellipse cx="292" cy="170" rx="6" ry="7" fill="#1A0A00"/>
  <circle cx="270" cy="168" r="2" fill="white" opacity="0.8"/>
  <circle cx="294" cy="168" r="2" fill="white" opacity="0.8"/>
  <!-- Eyebrows -->
  <path d="M261 161 Q268 157 275 161" stroke="#3D1C00" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M285 161 Q292 157 299 161" stroke="#3D1C00" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Nose -->
  <path d="M277 177 Q280 182 283 177" stroke="#5C3010" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <!-- Smile -->
  <path d="M268 188 Q280 198 292 188" stroke="#5C3010" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Teeth hint -->
  <path d="M270 190 Q280 195 290 190" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- Head wrap / gele -->
  <path d="M248 155 Q260 135 280 128 Q300 135 312 155 Q300 145 280 142 Q260 145 248 155Z" fill="#FFD166"/>
  <path d="M248 155 Q250 145 280 140 Q310 145 312 155 L318 150 Q308 130 280 125 Q252 130 242 150 Z" fill="#FFD166"/>
  <!-- Gele knot/bow -->
  <ellipse cx="305" cy="145" rx="18" ry="10" fill="#E8B400" transform="rotate(-20 305 145)"/>
  <ellipse cx="315" cy="138" rx="12" ry="8" fill="#FFD166" transform="rotate(-15 315 138)"/>
  <circle cx="308" cy="143" r="5" fill="#CC9900"/>
  <!-- Gele pattern -->
  <path d="M255 152 Q280 147 305 152" stroke="#CC9900" stroke-width="1.5" fill="none"/>

  <!-- Price tag / sign -->
  <rect x="390" y="230" width="130" height="65" rx="8" fill="white" stroke="#2D6A2D" stroke-width="2"/>
  <rect x="390" y="230" width="130" height="24" rx="8" fill="#2D6A2D"/>
  <path d="M390 246 L520 246" stroke="#2D6A2D" stroke-width="1" fill="none"/>
  <text x="455" y="248" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">FRESH TODAY</text>
  <text x="455" y="267" text-anchor="middle" font-family="Arial" font-size="11" fill="#2D6A2D" font-weight="bold">Authentic African</text>
  <text x="455" y="282" text-anchor="middle" font-family="Arial" font-size="11" fill="#E85D04" font-weight="bold">Foods 🌍</text>

  <!-- Decorative elements -->
  <!-- Floating food icons around -->
  <!-- Chilli -->
  <path d="M80 240 Q75 225 85 215 Q90 210 92 218 Q86 228 88 240 Z" fill="#E74C3C"/>
  <path d="M80 240 Q78 250 82 255 Q86 250 88 240 Z" fill="#E74C3C"/>
  <path d="M84 215 Q88 205 84 200" stroke="#2D6A2D" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Leaf -->
  <path d="M80 195 Q72 190 75 183 Q83 180 85 190 Z" fill="#2D6A2D"/>

  <!-- Stars/sparkles -->
  <text x="142" y="240" font-size="18" opacity="0.6">✨</text>
  <text x="490" y="180" font-size="14" opacity="0.5">⭐</text>
  <text x="170" y="180" font-size="12" opacity="0.4">🌿</text>
