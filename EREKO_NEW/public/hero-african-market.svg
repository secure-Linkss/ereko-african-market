  <circle cx="255" cy="255" r="5" fill="#FFD166" opacity="0.7"/>
  <circle cx="268" cy="270" r="4" fill="#2D6A2D" opacity="0.6"/>
  <circle cx="295" cy="250" r="5" fill="#FFD166" opacity="0.7"/>
  <circle cx="282" cy="280" r="4" fill="#2D6A2D" opacity="0.6"/>
  <path d="M248 240 Q270 245 292 240" stroke="#FFD166" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M245 260 Q270 266 295 260" stroke="#FFD166" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M243 280 Q270 287 297 280" stroke="#FFD166" stroke-width="1.5" fill="none" opacity="0.7"/>
