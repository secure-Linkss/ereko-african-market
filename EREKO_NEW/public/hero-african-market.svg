  <ellipse cx="322" cy="162" rx="30" ry="10" fill="#D4A574"/>
  <path d="M292 162 Q322 148 352 162 L348 172 Q322 162 296 172 Z" fill="#A0703C"/>
  <!-- Food in bowl (egusi soup or jollof) -->
  <ellipse cx="322" cy="160" rx="26" ry="8" fill="#E85D04" opacity="0.8"/>
  <circle cx="312" cy="158" r="3" fill="#8B0000" opacity="0.6"/>
  <circle cx="325" cy="161" r="2.5" fill="#8B0000" opacity="0.6"/>
  <circle cx="335" cy="157" r="3" fill="#8B0000" opacity="0.6"/>

  <!-- Basket in left hand area -->
  <path d="M218 285 Q230 275 242 285 L244 310 Q230 318 216 310 Z" fill="#8B6914"/>
  <!-- Basket weave lines -->
  <path d="M218 290 Q230 287 242 290" stroke="#6B4F10" stroke-width="1" fill="none"/>
  <path d="M217 298 Q230 295 243 298" stroke="#6B4F10" stroke-width="1" fill="none"/>
  <path d="M216 306 Q230 303 244 306" stroke="#6B4F10" stroke-width="1" fill="none"/>
