  <path d="M80 160 Q300 120 520 160 L540 200 Q300 165 60 200 Z" fill="#2D6A2D"/>
  <path d="M80 160 Q300 120 520 160" stroke="#FFD166" stroke-width="4" fill="none"/>
  <!-- Canopy fringe -->
  <path d="M80 200 Q90 215 100 200 Q110 215 120 200 Q130 215 140 200 Q150 215 160 200 Q170 215 180 200 Q190 215 200 200 Q210 215 220 200 Q230 215 240 200 Q250 215 260 200 Q270 215 280 200 Q290 215 300 200 Q310 215 320 200 Q330 215 340 200 Q350 215 360 200 Q370 215 380 200 Q390 215 400 200 Q410 215 420 200 Q430 215 440 200 Q450 215 460 200 Q470 215 480 200 Q490 215 500 200 Q510 215 520 200 Q530 215 540 200" stroke="#FFD166" stroke-width="2.5" fill="none"/>

