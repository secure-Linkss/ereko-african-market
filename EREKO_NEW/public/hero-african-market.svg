  <circle cx="224" cy="280" r="5" fill="#2D6A2D"/>
  <circle cx="232" cy="276" r="6" fill="#F4D03F"/>
  <circle cx="240" cy="280" r="5" fill="#E74C3C"/>

  <!-- Neck -->
